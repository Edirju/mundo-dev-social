<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto • 02 - Simple Music Player</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <main>
    <section class="player-section">
      <div class="album-art">
        <img src="https://s3.amazonaws.com/org.freecodecamp.mp3-player-project/quincy-larson-album-art.jpg"
          id="album-img" alt="Album Art">
      </div>

      <div class="song-info">
        <h1 id="player-song-title">Selecciona una canción</h1>
        <p id="player-song-artist">---</p>
      </div>

      <div class="controls">
        <button class="btn-control" id="shuffle" aria-label="Shuffle">
          <i data-lucide="shuffle" size="20"></i>
        </button>
        <button class="btn-control" id="previous" aria-label="Previous">
          <i data-lucide="skip-back" fill="currentColor"></i>
        </button>
        <button class="btn-control btn-play-pause" id="play" aria-label="Play">
          <i data-lucide="play" fill="currentColor" id="play-icon"></i>
        </button>
        <button class="btn-control" id="next" aria-label="Next">
          <i data-lucide="skip-forward" fill="currentColor"></i>
        </button>
        <button class="btn-control" id="loop" aria-label="Loop">
          <i data-lucide="repeat" size="20"></i>
        </button>
      </div>
    </section>

    <section class="playlist-section">
      <div class="playlist-header">
        <h2 class="">Tu playlist</h2>
        <i data-lucide="list-music" color="var(--neon-one)"></i>
      </div>
      <ul id="playlist-songs"></ul>
    </section>
  </main>

  <script src="main.js"></script>
</body>

</html>
